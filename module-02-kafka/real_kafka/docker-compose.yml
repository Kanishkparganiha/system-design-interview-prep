# Kafka Local Development Environment
# =====================================
# Run: docker-compose up -d
# Stop: docker-compose down
# View logs: docker-compose logs -f kafka

version: '3.8'

services:
  # Zookeeper - Required for Kafka cluster coordination (until KRaft is stable)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: echo stat | nc localhost 2181
      interval: 10s
      timeout: 10s
      retries: 3

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"      # External access
      - "29092:29092"    # Internal Docker network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 10s
      retries: 5

  # Kafka UI - Web interface to view topics, messages, consumers
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"

  # Schema Registry - For Avro schema management (optional but useful)
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:

# Usage Instructions:
# ===================
#
# 1. Start the cluster:
#    docker-compose up -d
#
# 2. Check status:
#    docker-compose ps
#
# 3. View Kafka UI:
#    Open http://localhost:8080
#
# 4. Create a topic manually:
#    docker exec -it kafka kafka-topics --create \
#      --topic my-topic \
#      --bootstrap-server localhost:9092 \
#      --partitions 3 \
#      --replication-factor 1
#
# 5. List topics:
#    docker exec -it kafka kafka-topics --list \
#      --bootstrap-server localhost:9092
#
# 6. Produce messages (CLI):
#    docker exec -it kafka kafka-console-producer \
#      --topic my-topic \
#      --bootstrap-server localhost:9092
#
# 7. Consume messages (CLI):
#    docker exec -it kafka kafka-console-consumer \
#      --topic my-topic \
#      --bootstrap-server localhost:9092 \
#      --from-beginning
#
# 8. Stop the cluster:
#    docker-compose down
#
# 9. Stop and remove volumes (clean start):
#    docker-compose down -v
